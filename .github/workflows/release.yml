name: Release

# Fires on any tag that looks like a semver release (v1.2.3). Builds
# pigo for six OS/arch combinations, packages each, and attaches the
# archives to a GitHub release created from the tag.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: linux,   goarch: arm,   goarm: "7" }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build and package
        id: pkg
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${GOARCH}${GOARM:+v${GOARM}}"
          BIN="pigo"
          [ "$GOOS" = "windows" ] && BIN="pigo.exe"

          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/raspbeguy/pigo.Version=${VERSION}" \
            -o "$BIN" ./cmd/pigo

          BASE="pigo_${VERSION}_${GOOS}_${ARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip -q "${BASE}.zip" "$BIN" README.md LICENSE
            ARCHIVE="${BASE}.zip"
          else
            tar -czf "${BASE}.tar.gz" "$BIN" README.md LICENSE
            ARCHIVE="${BASE}.tar.gz"
          fi
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "sha256=${ARCHIVE}.sha256" >> "$GITHUB_OUTPUT"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # Creates the release on first upload, appends on subsequent matrix
          # entries (idempotent on the tag). Generates notes from commits on
          # first call.
          files: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha256 }}
          generate_release_notes: true
